// ── FILTER ──
function filtered(){
  let r=PLACES.filter(p=>{
    if(state.type!=='전체'&&p.type!==state.type)return false;
    if(state.region!=='전체'&&p.region!==state.region)return false;
    if(state.search){const q=state.search.toLowerCase();return p.name.toLowerCase().includes(q)||p.region.includes(q)||p.area.includes(q)||p.type.includes(q);}
    return true;
  });
  r.sort((a,b)=>state.sort==='rating'?b.rating-a.rating:b.reviews-a.reviews);
  return r;
}

function initKakaoMap(f){
  var el=document.getElementById('the-map');
  if(!el||!window.kakao||!window.kakao.maps)return;
  
  // 이미 지도가 있으면 스킵 (re-render 방지)
  if(kakaoMap){return;}
  
  // 컨테이너 크기가 0이면 지연 재시도
  if(el.offsetWidth===0||el.offsetHeight===0){
    setTimeout(()=>initKakaoMap(f),100);
    return;
  }

  kakaoMarkers=[];

  const centers={
    '전체':{lat:36.0,lng:127.5,level:13},
    '서울':{lat:37.555,lng:126.97,level:8},
    '경기':{lat:37.4,lng:127.0,level:10},
    '부산':{lat:35.15,lng:129.06,level:8},
    '대구':{lat:35.85,lng:128.56,level:8},
    '인천':{lat:37.45,lng:126.65,level:8},
    '울산':{lat:35.55,lng:129.31,level:8},
    '대전':{lat:36.34,lng:127.38,level:8},
    '세종':{lat:36.50,lng:127.22,level:8},
    '광주':{lat:35.18,lng:126.85,level:8},
    '강원':{lat:37.8,lng:127.9,level:10},
    '충북':{lat:36.6,lng:127.5,level:9},
    '충남':{lat:36.8,lng:127.1,level:9},
    '전북':{lat:35.8,lng:127.1,level:9},
    '전남':{lat:34.8,lng:127.0,level:10},
    '경북':{lat:36.0,lng:129.0,level:10},
    '경남':{lat:35.2,lng:128.7,level:9},
    '제주':{lat:33.4,lng:126.55,level:9},
  };
  const ctr=centers[state.region]||centers['전체'];

  const options={
    center:new kakao.maps.LatLng(ctr.lat,ctr.lng),
    level:ctr.level

  kakaoMap=new kakao.maps.Map(el,options);
  mapObj=kakaoMap;
  kakaoInfowindow=new kakao.maps.InfoWindow({zIndex:1});

  // 줌 컨트롤
  kakaoMap.addControl(new kakao.maps.ZoomControl(),kakao.maps.ControlPosition.BOTTOMRIGHT);

  // 마커 추가
  f.forEach(function(p){

    var pos=new kakao.maps.LatLng(p.lat,p.lng);
    var marker=new kakao.maps.Marker({map:kakaoMap,position:pos});

    var content='<div style="padding:10px;font-family:Pretendard Variable,sans-serif;min-width:180px;max-width:240px">'
      +'<div style="font-size:14px;font-weight:700;margin-bottom:4px">'+p.name+'</div>'

      +'<div style="font-size:12px;margin-bottom:8px"><span style="color:#EF9F27">★ '+p.rating+'</span> · '+p.price+' · '+p.hours+'</div>'

      +'</div></div>';

    kakao.maps.event.addListener(marker,'click',function(){
      kakaoInfowindow.setContent(content);

    });
    kakaoMarkers.push(marker);
  });

  // bounds 맞추기
  if(f.length>1&&state.region==='전체'){
    var bounds=new kakao.maps.LatLngBounds();
    f.forEach(function(p){bounds.extend(new kakao.maps.LatLng(p.lat,p.lng))});
    kakaoMap.setBounds(bounds);
  }
}

// 내 주변 검색
function searchNearby(){
  if(!navigator.geolocation){showToast('위치 정보를 사용할 수 없습니다');return;}
  showToast('현재 위치를 찾는 중...');
  navigator.geolocation.getCurrentPosition(function(pos){
    var lat=pos.coords.latitude;
    var lng=pos.coords.longitude;
    if(!kakaoMap)return;

    var center=new kakao.maps.LatLng(lat,lng);
    kakaoMap.setCenter(center);
    kakaoMap.setLevel(4);

    // 현재 위치 마커
    new kakao.maps.Marker({map:kakaoMap,position:center,image:new kakao.maps.MarkerImage(
      'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png',
      new kakao.maps.Size(24,35)
    )});

    // 카카오 장소 검색
    var ps=new kakao.maps.services.Places(kakaoMap);
    var keywords=['찜질방','만화카페','수면카페','캡슐호텔','사우나'];
    var allResults=[];
    var done=0;

    keywords.forEach(function(kw){
      ps.keywordSearch(kw,function(data,status){
        done++;
        if(status===kakao.maps.services.Status.OK){
          data.forEach(function(place){
            // 중복 제거
            if(!allResults.find(function(r){return r.id===place.id})){
              allResults.push(place);
              // 마커 추가
              var marker=new kakao.maps.Marker({
                map:kakaoMap,
                position:new kakao.maps.LatLng(place.y,place.x)
              });
              var content='<div style="padding:10px;font-family:Pretendard Variable,sans-serif;min-width:180px;max-width:240px">'
                +'<div style="font-size:14px;font-weight:700;margin-bottom:4px">'+place.place_name+'</div>'
                +'<div style="font-size:12px;color:#888;margin-bottom:4px">'+place.address_name+'</div>'
                +(place.phone?'<div style="font-size:12px;color:#666;margin-bottom:6px">'+place.phone+'</div>':'')
                +'<a href="'+place.place_url+'" target="_blank" style="display:block;padding:6px;background:#FEE500;color:#3C1E1E;border-radius:6px;font-size:11px;font-weight:700;text-align:center;text-decoration:none">카카오맵에서 보기</a>'
                +'</div>';
              kakao.maps.event.addListener(marker,'click',function(){
                kakaoInfowindow.setContent(content);
                kakaoInfowindow.open(kakaoMap,marker);
              });
            }
          });
        }
        if(done===keywords.length){
          showToast('주변 '+allResults.length+'곳을 찾았습니다!');
        }
      },{location:center,radius:3000,sort:kakao.maps.services.SortBy.DISTANCE});
    });
  },function(){
    showToast('위치 권한을 허용해주세요');
  });
}

// render 래퍼 - 카카오 시도 후 실패시 Leaflet, 그리고 자동 내 주변 검색
var _origRender=render;
var autoSearched=false;
render=function(){
  _origRender();
  if(state.view==='map'){
    setTimeout(function(){
      var el=document.getElementById('the-map');
      if(!el||mapObj)return;
      // 카카오 시도
      try{
        if(window.kakao&&kakao.maps&&kakao.maps.LatLng){
          initKakaoMap(filtered());
          mapType='kakao';
          // 카카오맵 로드 성공 시 자동으로 내 주변 검색
          if(!autoSearched){autoSearched=true;setTimeout(function(){searchNearby()},500);}
          return;
        }
      }catch(e){console.log('kakao fail',e)}
      // Leaflet 폴백
      try{
        if(window.L){
          var c={lat:36,lng:127.5,z:7};
          mapObj=L.map(el,{center:[c.lat,c.lng],zoom:c.z,zoomControl:false});
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(mapObj);
          L.control.zoom({position:'bottomright'}).addTo(mapObj);
          mapType='leaflet';
          var ff=filtered();
          ff.forEach(function(p){
            var tc=TC[p.type];
            var ic=L.divIcon({html:'<div style="width:28px;height:28px;border-radius:50%;background:'+tc.c+';border:2.5px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:800">'+p.name.charAt(0)+'</div>',className:'',iconSize:[28,28],iconAnchor:[14,14]});
            L.marker([p.lat,p.lng],{icon:ic}).addTo(mapObj).bindPopup('<div style="font-family:sans-serif"><b>'+p.name+'</b><br><span style="color:#888;font-size:11px">'+p.region+' '+p.area+'</span><br><span style="color:#EF9F27">★'+p.rating+'</span> · '+p.price+'<br><a href="https://map.naver.com/v5/search/'+encodeURIComponent(p.name)+'" target="_blank" style="color:#03C75A;font-weight:700;font-size:12px">네이버지도</a></div>');
          });
          if(ff.length>1){var g=L.featureGroup(mapObj._layers?Object.values(mapObj._layers).filter(function(l){return l.getLatLng}):[]);if(g.getLayers().length)mapObj.fitBounds(g.getBounds().pad(0.1));}
          // Leaflet에서도 내 위치로 자동 이동
          if(!autoSearched){autoSearched=true;setTimeout(function(){searchNearby()},500);}
        }
      }catch(e2){console.log('leaflet fail',e2)}
    },300);
  }
};

  if(el){el.classList.add('tier-selected');el.style.borderColor='#7F77DD';el.style.background='#EEEDFE';}

function showToast(msg){
  var old=document.getElementById('copy-toast');if(old)old.remove();
  var d=document.createElement('div');d.id='copy-toast';
  d.innerHTML=msg||'복사되었습니다';
  d.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:99999;animation:toastIn .3s ease;white-space:nowrap;font-family:Pretendard Variable,sans-serif';
  document.body.appendChild(d);
  setTimeout(function(){d.style.animation='toastOut .3s ease forwards';setTimeout(function(){d.remove()},300)},2000);
}

function submitSuggest(e){
  if(e)e.stopPropagation();
  var name=document.getElementById('sg-name').value.trim();
  var type=document.getElementById('sg-type').value;
  var addr=document.getElementById('sg-addr').value.trim();
  var memo=document.getElementById('sg-memo').value.trim();
  if(!name||!type||!addr){showToast('이름, 유형, 주소를 입력해주세요');return;}
  var subject=encodeURIComponent('쪽잠맵 장소 추천: '+name);
  var body=encodeURIComponent('장소: '+name+'\n유형: '+type+'\n주소: '+addr+'\n메모: '+memo);
  window.location.href='mailto:ceochoiyj@gmail.com?subject='+subject+'&body='+body;
  showToast('메일 앱이 열립니다!');
}

function sharePlace(){
  const p=state.selected;if(!p)return;
  const t=`${p.name} — ${p.type} | ${p.price} | ${p.hours}\n쪽잠맵에서 보기`;
  if(navigator.share)navigator.share({title:p.name,text:t}).catch(()=>{});
  else{navigator.clipboard?.writeText(t);alert('클립보드에 복사되었습니다!');}
}
