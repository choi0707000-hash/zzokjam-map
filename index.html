*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}

.app{max-width:480px;margin:0 auto;min-height:100dvh;position:relative}
.header{background:#fff;padding:14px 20px 0;border-bottom:1px solid #f0f0ec;position:sticky;top:0;z-index:100}

.logo{font-size:22px;font-weight:800;letter-spacing:-.5px}.logo .accent{color:#7F77DD}

.search-icon{position:absolute;left:12px;top:12px;color:#bbb}
.view-toggle{display:flex;gap:4px;margin-bottom:10px;background:#F3F3EF;border-radius:10px;padding:3px}
.view-btn{flex:1;padding:7px;background:transparent;border:none;border-radius:8px;font-size:13px;font-weight:500;color:#999;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px}

.pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px}

.card{background:#fff;border-radius:16px;padding:16px;cursor:pointer;border:1px solid #f0f0ec;transition:transform .1s}

.card-row{display:flex;gap:12px;align-items:flex-start}
.card-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{display:flex;align-items:center;gap:6px;margin-top:4px;margin-bottom:6px}

.star{color:#EF9F27;display:flex;align-items:center;gap:2px}
.dot{color:#ddd}
.sort-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}

.cta-icon{width:40px;height:40px;border-radius:10px;background:#7F77DD;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.bottom-cta{margin-top:24px;background:#EEEDFE;border-radius:16px;padding:24px 20px;text-align:center}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:480px;width:100%;background:#fff;border-top:1px solid #f0f0ec;padding:6px 20px 10px;display:flex;justify-content:space-around;z-index:50}
.nav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 20px;font-size:10px;font-weight:600}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);display:flex;z-index:9999}
.sheet{background:#fff;border-radius:24px 24px 0 0;padding:28px 24px 36px;max-width:480px;width:100%;max-height:80dvh;overflow-y:auto;animation:sheetUp .3s ease}
.modal{background:#fff;border-radius:20px;padding:32px 24px;max-width:380px;width:100%;position:relative;animation:slideUp .25s ease}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(-50%) translateY(0)}to{opacity:0;transform:translateX(-50%) translateY(10px)}}

function ico(name,size=16){return (ICONS[name]||'').replace(/ICO/g,size);}
function stars(r){let h='';for(let i=1;i<=5;i++)h+=`<svg width="13" height="13" viewBox="0 0 24 24" fill="${i<=Math.round(r)?'#EF9F27':'none'}" stroke="#EF9F27" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;return h;}

// ── STATE ──
let state={type:'전체',region:'전체',view:'list',search:'',sort:'rating',selected:null,sponsor:false,showSearch:false};
function setState(patch){Object.assign(state,patch);render();}

// ── FILTER ──
function filtered(){
  let r=PLACES.filter(p=>{
    if(state.type!=='전체'&&p.type!==state.type)return false;
    if(state.region!=='전체'&&p.region!==state.region)return false;
    if(state.search){const q=state.search.toLowerCase();return p.name.toLowerCase().includes(q)||p.region.includes(q)||p.area.includes(q)||p.type.includes(q);}
    return true;
  });
  r.sort((a,b)=>state.sort==='rating'?b.rating-a.rating:b.reviews-a.reviews);
  return r;
}

// Leaflet 지도 초기화 (render 후 호출)
let leafletMap=null;
let leafletMarkers=[];
function initLeafletMap(f){
  const el=document.getElementById('leaflet-map');
  if(!el)return;

  // 기존 맵 제거
  if(leafletMap){leafletMap.remove();leafletMap=null;}
  leafletMarkers=[];

  // 지역별 중심/줌
  const centers={
    '전체':[36.0,127.5,7],
    '서울':[37.555,126.97,12],
    '부산':[35.15,129.06,12],
    '대구':[35.85,128.56,12],
    '인천':[37.45,126.65,12],
    '대전':[36.34,127.38,12],
    '광주':[35.18,126.85,12],
    '제주':[33.49,126.53,12],
  };
  const [clat,clng,czoom]=centers[state.region]||centers['전체'];

  leafletMap=L.map(el,{
    center:[clat,clng],
    zoom:czoom,
    zoomControl:false,
    attributionControl:false
  });

  // 타일 레이어 (OpenStreetMap 한국어)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:18,
    attribution:'© OpenStreetMap'
  }).addTo(leafletMap);

  // 줌 컨트롤 우측 하단
  L.control.zoom({position:'bottomright'}).addTo(leafletMap);

  // 컬러 마커 생성
  f.forEach(p=>{
    const c=TC[p.type];
    const markerHtml=`
      <div style="display:flex;flex-direction:column;align-items:center">
        <div style="width:34px;height:34px;border-radius:50%;background:${c.c};display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,.35);border:3px solid #fff;color:#fff;font-size:12px;font-weight:800">
          ${p.name.charAt(0)}
        </div>
        <div style="background:#fff;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.15);margin-top:3px;color:#333;max-width:80px;overflow:hidden;text-overflow:ellipsis;text-align:center">
          ${p.name.length>7?p.name.slice(0,7)+'…':p.name}
        </div>
      </div>`;

    const icon=L.divIcon({
      html:markerHtml,
      className:'',
      iconSize:[80,55],
      iconAnchor:[40,45],
    });

    const marker=L.marker([p.lat,p.lng],{icon}).addTo(leafletMap);

    // 팝업
    const popupHtml=`
      <div style="font-family:Pretendard Variable,sans-serif;min-width:180px;padding:4px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div style="width:32px;height:32px;border-radius:8px;background:${c.bg};display:flex;align-items:center;justify-content:center;color:${c.c};flex-shrink:0">${ico(c.ic,16)}</div>
          <div>
            <div style="font-size:14px;font-weight:700;color:#1a1a1a">${p.name}</div>
            <div style="font-size:11px;color:#888">${p.region} ${p.area}</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;font-size:12px;color:#666;margin-bottom:8px">
          <span style="color:#EF9F27;font-weight:600">★ ${p.rating}</span>
          <span>${p.price}</span>
          <span style="color:${p.is24?'#1D9E75':'#888'};font-weight:${p.is24?600:400}">${p.hours}</span>
        </div>
        <div style="display:flex;gap:6px">
          <button onclick="setState({selected:PLACES.find(x=>x.id===${p.id})})" style="flex:1;padding:7px;background:${c.c};color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">상세보기</button>
          <button onclick="window.open('https://map.naver.com/v5/search/${encodeURIComponent(p.name+' '+p.area)}','_blank')" style="padding:7px 10px;background:#03C75A;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">네이버지도</button>
        </div>
      </div>`;

    marker.bindPopup(popupHtml,{closeButton:true,maxWidth:260,className:'zzokjam-popup'});
    leafletMarkers.push(marker);
  });

  // 마커가 있으면 bounds 맞추기
  if(f.length>0&&state.region==='전체'){
    const group=L.featureGroup(leafletMarkers);
    leafletMap.fitBounds(group.getBounds().pad(0.1));
  }
}

// render 후 지도 초기화를 위한 래퍼

function copyAccount(e){
  if(e)e.stopPropagation();
  var acc='29489058920207';
  var sel=document.querySelector('.tier-selected');
  var amt=sel?sel.getAttribute('data-amt'):'';
  var msg=amt?'계좌번호가 복사되었습니다 ('+amt+')':'계좌번호가 복사되었습니다';
  if(navigator.clipboard){
    navigator.clipboard.writeText(acc).then(function(){showToast(msg)});
  }else{
    var t=document.createElement('textarea');t.value=acc;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);
    showToast(msg);
  }
}
function selectTier(e,idx){
  if(e)e.stopPropagation();
  document.querySelectorAll('.tier').forEach(function(el){el.classList.remove('tier-selected');el.style.borderColor='transparent';el.style.background='#F8F8F6'});
  var el=document.querySelectorAll('.tier')[idx];

function showToast(msg){
  var old=document.getElementById('copy-toast');if(old)old.remove();
  var d=document.createElement('div');d.id='copy-toast';
  d.innerHTML=msg||'복사되었습니다';
  d.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:99999;animation:toastIn .3s ease;white-space:nowrap;font-family:Pretendard Variable,sans-serif';
  document.body.appendChild(d);
  setTimeout(function(){d.style.animation='toastOut .3s ease forwards';setTimeout(function(){d.remove()},300)},2000);
}

function sharePlace(){
  const p=state.selected;if(!p)return;
  const t=`${p.name} — ${p.type} | ${p.price} | ${p.hours}\n쪽잠맵에서 보기`;
  if(navigator.share)navigator.share({title:p.name,text:t}).catch(()=>{});
  else{navigator.clipboard?.writeText(t);alert('클립보드에 복사되었습니다!');}
}
